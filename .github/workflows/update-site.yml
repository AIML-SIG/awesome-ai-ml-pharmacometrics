name: Update Explorer Site

on:
  # Daily at 06:00 UTC (08:00 CET)
  push:
    branches: main
    paths:
      - 'README.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout explorer repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build site
        run: python deploymentFiles/build_site.py --readme README.md --output deploymentFiles/index.html

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet deploymentFiles/index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploymentFiles/index.html
          git commit -m "🔄 Auto-update site from source README

          Triggered by: ${{ github.event_name }}"
          git push

      - name: Summary
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "### ✅ Site updated" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ℹ️ No changes detected" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Papers parsed from README:" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json, re
          with open('README.md') as f: content = f.read()
          papers = len(re.findall(r'- \*\*\[', content))
          print(f'- **{papers}** paper entries found')
          " >> $GITHUB_STEP_SUMMARY
